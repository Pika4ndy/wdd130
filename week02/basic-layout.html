<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A basic HTML structure using semantic HTML elements">
    <meta name="author" content="Andrianarivo Andy">
    <title>Basic HTML Structure</title>
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="Website logo" width="128" height="128">
        <nav>
            <ul>

                        Physicist</a></li>
                <li><a href="https://fr.wikipedia.org/wiki/Physique_quantique">Quantum Physics</a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Molestias, vitae.</p>
        </section>
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Nulla, id.</p>
        </section>
    </main>
    <aside>
        <img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/albuquerque-new-mexico/1280x800/albuquerque-temple-lds-137883-wallpaper.jpg"
          alt="Albuquerque Mexico Temple" width="200">

    <footer>
        <p>Andrianarivo Andy</p>
    </footer>

</html>
